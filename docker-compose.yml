services:
  pkmovie-app-dev:
    build:
      context: .
      target: development
    image: waiyandev/pkmovie-app-dev:latest
    container_name: pkmovie-app-dev
    ports:
      - "3000:3000"
    command: ["sh", "-c", "pnpm install && pnpm dev --hostname 0.0.0.0 --port 3000"]
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - pkmovie_node_modules:/app/node_modules
      - pkmovie_pnpm_store:/root/.pnpm-store
    depends_on:
      - pkmovie-db
  # pkmovie-app:
  #   build:
  #     context: .
  #     target: production
  #   image: waiyandev/pkmovie-app:latest
  #   container_name: pkmovie-app
  #   ports:
  #     - "3000:3000"
  #   env_file:
  #     - .env.docker
  #   depends_on:
  #     - pkmovie-db
  pkmovie-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=pkmovie
    container_name: pkmovie-db
    ports:
      - "5433:5432"
    volumes:
      - pkmovie_db_data:/var/lib/postgresql/data
volumes:
  pkmovie_db_data:
  pkmovie_app_data:
  pkmovie_node_modules:
  pkmovie_pnpm_store:
