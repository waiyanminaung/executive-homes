name: Pk Movie Build

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs: 
  deploy:
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'

      - name: Create env file
        run: echo "${{ secrets.DOTENV_FILE }}" > .env
      
      - name: Install dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Prepare deploy files
        run: |
          mkdir -p deploy/.next
          cp -r .next/standalone/* deploy/
          cp -r .next/static deploy/.next/static
          cp -r public deploy/public || true

      - name: Prepare server directory
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
              sudo mkdir -p /var/www/pkmovie-app
              sudo chown -R $USER:$USER /var/www/pkmovie-app

      - name: Upload build output to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy/*"
          target: "/var/www/pkmovie-app"
          strip_components: 1

      - name: Restart app on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/pkmovie-app

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            node -v

            pm2 restart pkmovie-app || pm2 start server.js --name pkmovie-app