name: Pk Movie Build

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs: 
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            node -v
            npm -v

            REPO_DIR="$HOME/pkmovie-app"
            REPO_URL="git@github.com:${{ github.repository }}.git"

            mkdir -p ~/.ssh
            ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts
            
            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "Repository not found or .git missing. Cloning..."
              rm -rf $REPO_DIR
              git clone $REPO_URL $REPO_DIR
            fi

            cd $REPO_DIR
            git fetch origin main
            git reset --hard origin/main

            
            # Create .env file
            echo "${{ secrets.DOTENV_FILE }}" > .env
            
            # Dependencies installation
            npm ci

            
            # Prisma Operations
            npx prisma generate
            npx prisma db push --accept-data-loss 
            
            # Build Application
            npm run build
            
            # PM2 Management 
            if pm2 describe "pkmovie-app" > /dev/null; then
              pm2 reload "pkmovie-app"
            else
              pm2 start "npm" --name "pkmovie-app" -- start
            fi