name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: waiyandev/executive-homes-app-prod:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            PROJECT_DIR="/var/www/executive-homes"
            REPO_URL="git@github.com:${{ github.repository }}.git"

            if [ ! -d "$PROJECT_DIR/.git" ]; then
              rm -rf $PROJECT_DIR
              git clone $REPO_URL $PROJECT_DIR
            fi

            cd $PROJECT_DIR

            git fetch origin main
            git reset --hard origin/main

            cat > .env.docker <<'EOF'
            ${{ secrets.DOTENV_DOCKER }}
            EOF

            docker compose pull executive-homes-app-prod

            docker compose --profile prod up -d executive-homes-db executive-homes-app-prod
